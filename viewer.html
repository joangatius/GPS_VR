
<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Visor Universal VR - Objectes 3D</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    // --- CONTROL COMANDAMENT ESQUERRE (Moure Pla XZ + Fer Petit) ---
    AFRAME.registerComponent('control-esquerre', {
      schema: { target: { type: 'selector' } },
      
      init: function () {
        this.stickX = 0;
        this.stickY = 0;
        this.isScalingDown = false;
        
        this.el.addEventListener('thumbstickmoved', (e) => {
          this.stickX = e.detail.x; 
          this.stickY = e.detail.y; 
        });

        this.el.addEventListener('triggerdown', () => { this.isScalingDown = true; });
        this.el.addEventListener('triggerup', () => { this.isScalingDown = false; });
      },
      
      tick: function () {
        if (!this.data.target) return;
        let obj = this.data.target.object3D;
        
        if (Math.abs(this.stickX) > 0.1) { obj.position.x += this.stickX * 0.05; }
        if (Math.abs(this.stickY) > 0.1) { obj.position.z += this.stickY * 0.05; }

        if (this.isScalingDown) {
          obj.scale.multiplyScalar(0.98); 
          if (obj.scale.x < 0.00001) obj.scale.set(0.00001, 0.00001, 0.00001);
        }
      }
    });

    // --- CONTROL COMANDAMENT DRET (Ascensor, Girar + Fer Gran) ---
    AFRAME.registerComponent('control-dret', {
      schema: { target: { type: 'selector' } },
      
      init: function () {
        this.stickX = 0;
        this.stickY = 0;
        this.isScalingUp = false;
        
        this.el.addEventListener('thumbstickmoved', (e) => {
          this.stickX = e.detail.x; 
          this.stickY = e.detail.y; 
        });

        this.el.addEventListener('triggerdown', () => { this.isScalingUp = true; });
        this.el.addEventListener('triggerup', () => { this.isScalingUp = false; });
      },
      
      tick: function () {
        if (!this.data.target) return;
        let obj = this.data.target.object3D;
        
        if (Math.abs(this.stickX) > 0.1) { obj.rotation.y -= this.stickX * 0.05; }
        if (Math.abs(this.stickY) > 0.1) { obj.position.y -= this.stickY * 0.05; }

        if (this.isScalingUp) {
          obj.scale.multiplyScalar(1.02); 
          if (obj.scale.x > 1000.0) obj.scale.set(1000.0, 1000.0, 1000.0);
        }
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <a-assets>
      <!-- ========================================== -->
      <!-- AQUÍ POSES EL NOM DEL TEU NOU ARXIU GLB    -->
      <!-- ========================================== -->
      <a-asset-item id="model-actiu" src="eukarya.glb?v=1"></a-asset-item>
    </a-assets>

    <a-light type="ambient" color="#FFF" intensity="0.5"></a-light>
    <a-light type="directional" color="#FFF2E6" intensity="0.6" position="2 4 3"></a-light>

    <a-entity laser-controls="hand: left" raycaster="far: 5" control-esquerre="target: #visor-3d"></a-entity>
    <a-entity laser-controls="hand: right" raycaster="far: 5" control-dret="target: #visor-3d"></a-entity>

    <!-- EL VISOR ON CARREGA L'OBJECTE -->
    <a-entity 
        id="visor-3d"
        gltf-model="#model-actiu" 
        position="0 1.0 -1.5" 
        scale="1 1 1">
    </a-entity>

    <a-entity position="-1.5 1.5 -2" rotation="0 25 0">
      <a-plane material="shader: flat; color: #111; transparent: true; opacity: 0.9" width="2.4" height="1.4" border-radius="0.05"></a-plane>
      <a-text value="COMANDAMENTS VR" position="-1.0 0.55 0.01" color="#32CD32" width="2" wrap-count="20" baseline="top" font="mozillavr"></a-text>
      <a-text value="MÀ DRETA:" position="-1.0 0.30 0.01" color="#FFD700" width="2" wrap-count="25" baseline="top" font="mozillavr"></a-text>
      <a-text value="- Joystick Amunt / Avall: Pujar i Baixar el model\n- Joystick Esq / Dreta: Girar el model\n- Gallet (Trigger): Fer MÉS GRAN (Escalar)" position="-1.0 0.15 0.01" color="white" width="2.0" wrap-count="45" baseline="top" font="mozillavr"></a-text>
      <a-text value="MÀ ESQUERRA:" position="-1.0 -0.15 0.01" color="#1E90FF" width="2" wrap-count="25" baseline="top" font="mozillavr"></a-text>
      <a-text value="- Joystick Amunt / Avall: Apropar o allunyar\n- Joystick Esq / Dreta: Moure lateralment\n- Gallet (Trigger): Fer MÉS PETIT (Escalar)" position="-1.0 -0.30 0.01" color="white" width="2.0" wrap-count="45" baseline="top" font="mozillavr"></a-text>
    </a-entity>

  </a-scene>

</body>
</html>
