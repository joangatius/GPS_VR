<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Repte 4 VR - Muntanya Irregular a Escala Real</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    let cotaObjectiu = 2350; 
    let encerts = 0;
    let veuDesbloquejada = false;
    let audioCtx = null;
    let esperantNovaCota = false;

    // Desbloqueig de veu
    document.addEventListener('click', () => {
      if (!veuDesbloquejada && 'speechSynthesis' in window) {
        let msgSilenci = new SpeechSynthesisUtterance('');
        msgSilenci.volume = 0; window.speechSynthesis.speak(msgSilenci);
        veuDesbloquejada = true;
      }
    }, { once: true });

    function ferBip(tipus) {
      if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.type = 'sine';
      
      if (tipus === 'encert') osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
      else if (tipus === 'error') osc.frequency.setValueAtTime(300, audioCtx.currentTime); 
      else osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
      
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function parlar(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        let missatge = new SpeechSynthesisUtterance(text);
        let voices = window.speechSynthesis.getVoices();
        let voice = voices.find(v => v.lang.startsWith('ca')) || voices.find(v => v.lang.startsWith('es')) || voices[0];
        if (voice) missatge.voice = voice;
        missatge.lang = voice ? voice.lang : 'ca-ES';
        window.speechSynthesis.speak(missatge);
      }
    }

    function nouObjectiu() {
      let cotaAnterior = cotaObjectiu;
      while (cotaObjectiu === cotaAnterior) {
        let nivellRandom = Math.floor(Math.random() * 15) + 1; // De l'1 al 15
        cotaObjectiu = 2000 + (nivellRandom * 50);
      }
      document.getElementById('text-objectiu').setAttribute('value', `OBJECTIU:\nTroba la cota ${cotaObjectiu}m`);
      document.getElementById('text-info').setAttribute('value', "Apunta a una de les línies blaves i dispara.");
      esperantNovaCota = false;
    }

    // 1. MOTOR D'INTERACCIÓ
    AFRAME.registerComponent('control-corbes', {
      init: function () {
        this.comandament = this.el;

        this.comandament.addEventListener('triggerdown', (e) => {
          if (esperantNovaCota) return; // Bloqueig mentre celebrem encert

          let tocats = this.comandament.components.raycaster.intersectedEls;
          
          if (tocats.length > 0) {
            let tocat = tocats[0];

            if (tocat.classList.contains('corba-nivell')) {
              let cotaTocada = parseInt(tocat.getAttribute('data-cota'));
              let meshLinia = tocat.meshLinia; 
              
              if (cotaTocada === cotaObjectiu) {
                // --- ENCERT ---
                esperantNovaCota = true;
                ferBip('encert');
                parlar(`Molt bé! Aquesta és la cota ${cotaTocada}.`);
                encerts++;
                document.getElementById('text-marcador').setAttribute('value', `Punts: ${encerts}`);
                document.getElementById('text-info').setAttribute('value', `Molt bé! Has trobat els ${cotaTocada}m.\n\nPreparant següent cota...`);
                
                meshLinia.material.color.setHex(0x32CD32); // Verd
                
                setTimeout(() => {
                  meshLinia.material.color.setHex(tocat.colorOriginal); 
                  nouObjectiu();
                }, 3000);

              } else {
                // --- ERROR ---
                ferBip('error');
                parlar(`Error. Has tocat la cota ${cotaTocada}.`);
                document.getElementById('text-info').setAttribute('value', `ERROR!\nHas tocat la cota ${cotaTocada}m.\n\nHas de trobar la de ${cotaObjectiu}m.\n(Compta pujant de 50 en 50 des del verd)`);
                
                meshLinia.material.color.setHex(0xFF0000); // Vermell
                setTimeout(() => { meshLinia.material.color.setHex(tocat.colorOriginal); }, 1500);
              }
            }
          }
        });
      }
    });

    // 2. GENERADOR TOPOGRÀFIC MATEMÀTIC IRREGULAR (Terreny real i neu)
    AFRAME.registerComponent('generador-muntanya-real', {
      init: function () {
        let muntanya = this.el;
        let cotaBase = 2000;
        let equidistancia = 50;
        let numNivells = 16; 
        
        let H = 2.4; // 2.4 metres d'alçada física
        let R_base = 2.5; // 5 metres d'amplada física
        let visualGap = H / (numNivells - 1); 

        // Funció matemàtica per donar forma al terreny
        function getRadius(y, theta) {
          let v = 1 - (y / H);
          if (v < 0) v = 0;
          // Corba tipus Bezier (campana suau)
          let perfilVertical = R_base * (0.8 * Math.pow(v, 1.5) + 0.2 * v);
          // Irregularitats de la roca i entrades de les valls
          let soroll = 1 + 0.15 * Math.sin(3 * theta + y * 2) + 0.08 * Math.cos(5 * theta - y) + 0.12 * Math.sin(2 * theta);
          return perfilVertical * soroll;
        }

        // --- A) CREAR LA MALLA SÒLIDA (La pedra i la neu) ---
        let radialSeg = 128;
        let heightSeg = 64;
        let geoMuntanya = new THREE.CylinderGeometry(0.01, R_base, H, radialSeg, heightSeg, false);
        geoMuntanya.translate(0, H/2, 0); // Posem la base arran de terra

        let posAttr = geoMuntanya.attributes.position;
        let colors =[];
        let colorObj = new THREE.Color();

        for (let i = 0; i < posAttr.count; i++) {
          let x = posAttr.getX(i);
          let y = posAttr.getY(i);
          let z = posAttr.getZ(i);

          let theta = Math.atan2(z, x);
          
          if (y >= H - 0.01) {
             posAttr.setXYZ(i, 0, H, 0);
             colorObj.setRGB(1, 1, 1); 
             colors.push(colorObj.r, colorObj.g, colorObj.b);
             continue;
          }

          // Deformem el vèrtex
          let r = getRadius(y, theta);
          posAttr.setX(i, r * Math.cos(theta));
          posAttr.setZ(i, r * Math.sin(theta));

          // NEU IRREGULAR (La neu baixa per unes bandes i puja per unes altres)
          let neuBase = H * 0.55; 
          let neuVariacio = 0.4 * Math.sin(4 * theta) + 0.3 * Math.cos(6 * theta - y);
          let neuLimit = neuBase + neuVariacio;

          if (y > neuLimit) {
            // Neu
            let blanc = 0.85 + 0.15 * Math.random();
            colorObj.setRGB(blanc, blanc, blanc * 1.05); // Un pèl blavós
          } else {
            // Roca / Terra
            let mix = Math.random() * 0.1;
            if (y < H * 0.2) {
                colorObj.setRGB(0.2 + mix, 0.4 + mix, 0.1); // Herba a la base
            } else {
                colorObj.setRGB(0.45 + mix, 0.30 + mix, 0.20 + mix); // Roca marró
            }
          }
          colors.push(colorObj.r, colorObj.g, colorObj.b);
        }

        geoMuntanya.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
        geoMuntanya.computeVertexNormals();

        // El flatShading dóna un toc poligonal de roca molt xulo
        let matMuntanya = new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 1.0, flatShading: true });
        let meshMuntanya = new THREE.Mesh(geoMuntanya, matMuntanya);
        muntanya.setObject3D('mesh', meshMuntanya);

        // --- B) CREAR LES CORBES DE NIVELL ---
        for(let i = 0; i < numNivells; i++) {
          let y_visual = i * visualGap;
          let cotaReal = cotaBase + (i * equidistancia);

          let segments = 128;
          let puntsCorba =[];
          for (let j = 0; j < segments; j++) {
            let theta = (j / segments) * Math.PI * 2;
            let r = getRadius(y_visual, theta);
            r += 0.008; // La línia surt uns mil·límetres enfora de la pedra perquè es vegi clarament
            puntsCorba.push(new THREE.Vector3(r * Math.cos(theta), y_visual, r * Math.sin(theta)));
          }
          puntsCorba.push(puntsCorba[0]); 

          let curve3D = new THREE.CatmullRomCurve3(puntsCorba);
          
          let esNeu = y_visual > (H * 0.6); 
          let colorLinia = (i === 0) ? 0x32CD32 : (esNeu ? 0x00BFFF : 0x00FFFF);

          // La línia visual (primmíssima)
          let geoLinia = new THREE.TubeGeometry(curve3D, segments, 0.003, 8, true);
          let matLinia = new THREE.MeshBasicMaterial({ color: colorLinia });
          let meshLinia = new THREE.Mesh(geoLinia, matLinia);

          // L'escut de protecció invisible (perquè el làser no falli)
          let geoHitbox = new THREE.TubeGeometry(curve3D, segments, 0.035, 8, true);
          let matHitbox = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.0, depthWrite: false });
          let meshHitbox = new THREE.Mesh(geoHitbox, matHitbox);

          let entitatNivell = document.createElement('a-entity');
          let obj3D = new THREE.Group();
          obj3D.add(meshLinia);
          obj3D.add(meshHitbox);
          entitatNivell.setObject3D('mesh', obj3D);
          
          entitatNivell.classList.add('corba-nivell');
          entitatNivell.setAttribute('data-cota', cotaReal);
          entitatNivell.colorOriginal = colorLinia;
          entitatNivell.meshLinia = meshLinia;

          muntanya.appendChild(entitatNivell);
        }
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <!-- Llums per donar volum i ombres a la muntanya -->
    <a-light type="ambient" color="#FFF" intensity="0.5"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.8" position="2 4 3"></a-light>

    <a-entity laser-controls="hand: left" raycaster="objects: .corba-nivell; far: 5" control-corbes></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .corba-nivell; far: 5" control-corbes></a-entity>

    <!-- LA MUNTANYA GEGANT (Centrada a terra, separada de tu 2.5 metres) -->
    <a-entity position="0 0 -2.5" generador-muntanya-real></a-entity>

    <!-- ============================================== -->
    <!-- PANELL DEL JOC (Flotant Alt perquè no el tapi el cim) -->
    <!-- ============================================== -->
    <a-entity position="0 2.8 -3.5" rotation="15 0 0">
      
      <a-plane material="shader: flat; color: #111; transparent: true; opacity: 0.95" width="2.4" height="1.0" border-radius="0.05"></a-plane>
      
      <a-text value="Laboratori de Topografia" position="-1.1 0.4 0.01" color="#32CD32" width="2.2" wrap-count="35" baseline="top" font="mozillavr"></a-text>
      
      <a-text id="text-objectiu" value="OBJECTIU:\nTroba la cota 2350m" position="-1.1 0.1 0.01" color="#FFD700" width="1.6" wrap-count="20" baseline="top" font="mozillavr"></a-text>
      
      <a-text id="text-info" value="Observa la forma de la muntanya.\nLa línia verda de sota de tot són 2000m d'alçada.\nL'equidistància (el salt d'alçada entre línies) és de 50m." position="-1.1 -0.2 0.01" color="white" width="2.2" wrap-count="45" baseline="top" font="mozillavr"></a-text>
      
      <a-text id="text-marcador" value="Punts: 0" position="0.5 0.1 0.01" color="#00FFFF" width="1.4" wrap-count="15" baseline="top" align="right" font="mozillavr"></a-text>
      
    </a-entity>

  </a-scene>

</body>
</html>
