<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Repte 4 VR - Muntanya Irregular a Escala Real</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    let cotaObjectiu = 2350; 
    let encerts = 0;
    let veuDesbloquejada = false;
    let audioCtx = null;
    let esperantNovaCota = false;

    // Desbloqueig de veu
    document.addEventListener('click', () => {
      if (!veuDesbloquejada && 'speechSynthesis' in window) {
        let msgSilenci = new SpeechSynthesisUtterance('');
        msgSilenci.volume = 0; window.speechSynthesis.speak(msgSilenci);
        veuDesbloquejada = true;
      }
    }, { once: true });

    function ferBip(tipus) {
      if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.type = 'sine';
      
      if (tipus === 'encert') osc.frequency.setValueAtTime(1200, audioCtx.currentTime); 
      else if (tipus === 'error') osc.frequency.setValueAtTime(300, audioCtx.currentTime); 
      else osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
      
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function parlar(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        let missatge = new SpeechSynthesisUtterance(text);
        let voices = window.speechSynthesis.getVoices();
        let voice = voices.find(v => v.lang.startsWith('ca')) || voices.find(v => v.lang.startsWith('es')) || voices[0];
        if (voice) missatge.voice = voice;
        missatge.lang = voice ? voice.lang : 'ca-ES';
        window.speechSynthesis.speak(missatge);
      }
    }

    function nouObjectiu() {
      let cotaAnterior = cotaObjectiu;
      while (cotaObjectiu === cotaAnterior) {
        let nivellRandom = Math.floor(Math.random() * 15) + 1; // Genera de l'1 al 15
        cotaObjectiu = 2000 + (nivellRandom * 50);
      }
      document.getElementById('text-objectiu').setAttribute('value', `OBJECTIU:\nTroba la cota ${cotaObjectiu}m`);
      document.getElementById('text-info').setAttribute('value', "Apunta a una de les línies i dispara.");
      esperantNovaCota = false;
    }

    // 1. MOTOR D'INTERACCIÓ
    AFRAME.registerComponent('control-corbes', {
      init: function () {
        this.comandament = this.el;

        this.comandament.addEventListener('triggerdown', (e) => {
          if (esperantNovaCota) return;

          let tocats = this.comandament.components.raycaster.intersectedEls;
          
          if (tocats.length > 0) {
            let tocat = tocats[0];

            if (tocat.classList.contains('corba-nivell')) {
              let cotaTocada = parseInt(tocat.getAttribute('data-cota'));
              let meshLinia = tocat.meshLinia; 
              
              if (cotaTocada === cotaObjectiu) {
                // ENCERT
                esperantNovaCota = true;
                ferBip('encert');
                parlar(`Perfecte! Aquesta és la cota ${cotaTocada}.`);
                encerts++;
                document.getElementById('text-marcador').setAttribute('value', `Punts: ${encerts}`);
                document.getElementById('text-info').setAttribute('value', `Molt bé! Has trobat els ${cotaTocada}m.\n\nPreparant següent cota...`);
                
                meshLinia.material.color.setHex(0x32CD32); 
                
                setTimeout(() => {
                  meshLinia.material.color.setHex(tocat.colorOriginal); 
                  nouObjectiu();
                }, 3000);

              } else {
                // ERROR
                ferBip('error');
                parlar(`Error. Aquesta és la cota ${cotaTocada}.`);
                document.getElementById('text-info').setAttribute('value', `ERROR! Aquesta és la cota ${cotaTocada}m.\n\nHas de trobar la de ${cotaObjectiu}m. Recorda que la base és a 2000m.`);
                
                meshLinia.material.color.setHex(0xFF0000); 
                setTimeout(() => { meshLinia.material.color.setHex(tocat.colorOriginal); }, 1500);
              }
            }
          }
        });
      }
    });

    // 2. GENERADOR TOPOGRÀFIC MATEMÀTIC IRREGULAR (Usant Three.js pur)
    AFRAME.registerComponent('generador-muntanya', {
      init: function () {
        let muntanya = this.el;
        let cotaBase = 2000;
        let equidistancia = 50;
        let numNivells = 16; // 16 capes * 0.125m = 2 metres d'alçada!
        
        let radiBase = 1.8; // Amplada de 3.6 metres!
        let alçadaCapa = 0.125; 

        for(let i = 0; i < numNivells; i++) {
          let proporcio = i / (numNivells - 1); 
          let cotaReal = cotaBase + (i * equidistancia);
          let radiNivell = radiBase * Math.exp(-2.5 * Math.pow(proporcio, 1.5));

          let segments = 64;
          let shape = new THREE.Shape();
          let puntsCorba =[];

          // Creem el perímetre irregular amb trigonometria
          for (let j = 0; j < segments; j++) {
            let angle = (j / segments) * Math.PI * 2;
            // El 'soroll' crea la forma irregular de la muntanya (canvia a cada pis amb 'i')
            let soroll = 1 + 0.12 * Math.sin(3 * angle + (i*0.2)) + 0.08 * Math.cos(5 * angle - (i*0.1));
            let r = radiNivell * soroll;
            
            let x = Math.cos(angle) * r;
            let z = Math.sin(angle) * r; 
            
            if (j === 0) shape.moveTo(x, z);
            else shape.lineTo(x, z);
            
            // Punts 3D per a la línia de cota. (El pla Shape Y es convertirà en -Z per la rotació)
            puntsCorba.push(new THREE.Vector3(x, 0, -z));
          }
          puntsCorba.push(puntsCorba[0]); // Tanquem la línia

          // LA CAPA FÍSICA (ExtrudeGeometry)
          let extrudeSettings = { depth: alçadaCapa, bevelEnabled: false };
          let geoCapa = new THREE.ExtrudeGeometry(shape, extrudeSettings);
          
          let esNeu = (i >= 12); // Si estem molt amunt, posem neu!
          let colorCapa = esNeu ? 0xFFFFFF : 0x00008B;
          let opacitatCapa = esNeu ? 0.95 : 0.6;
          
          let matCapa = new THREE.MeshBasicMaterial({ color: colorCapa, transparent: true, opacity: opacitatCapa });
          let meshCapa = new THREE.Mesh(geoCapa, matCapa);
          meshCapa.rotation.x = -Math.PI / 2; // Tumbem el dibuix 2D per fer-lo 3D horitzontal

          // LA LÍNIA VISIBLE (Molt fina)
          let curve3D = new THREE.CatmullRomCurve3(puntsCorba);
          let colorLinia = (i === 0) ? 0x32CD32 : (esNeu ? 0xDDDDDD : 0x00FFFF);
          let geoLinia = new THREE.TubeGeometry(curve3D, segments, 0.003, 8, true);
          let matLinia = new THREE.MeshBasicMaterial({ color: colorLinia });
          let meshLinia = new THREE.Mesh(geoLinia, matLinia);
          meshLinia.position.y = alçadaCapa; // Puja la línia a dalt de la llesca

          // EL HITBOX INVISIBLE (Molt més gruixut per clicar bé i que no foradi l'holograma)
          let geoHitbox = new THREE.TubeGeometry(curve3D, segments, 0.03, 8, true);
          let matHitbox = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.0, depthWrite: false });
          let meshHitbox = new THREE.Mesh(geoHitbox, matHitbox);
          meshHitbox.position.y = alçadaCapa;

          // AGRUPEM TOT EN UNA ENTITAT A-FRAME
          let entitatNivell = document.createElement('a-entity');
          entitatNivell.setAttribute('position', `0 ${i * alçadaCapa} 0`);
          
          let obj3D = new THREE.Group();
          obj3D.add(meshCapa);
          obj3D.add(meshLinia);
          obj3D.add(meshHitbox);
          entitatNivell.setObject3D('mesh', obj3D);
          
          entitatNivell.classList.add('corba-nivell');
          entitatNivell.setAttribute('data-cota', cotaReal);
          entitatNivell.colorOriginal = colorLinia;
          entitatNivell.meshLinia = meshLinia;

          muntanya.appendChild(entitatNivell);
        }
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <a-entity laser-controls="hand: left" raycaster="objects: .corba-nivell; far: 5" control-corbes></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .corba-nivell; far: 5" control-corbes></a-entity>

    <!-- LA MUNTANYA GEGANT (Centrada a 2 metres endavant) -->
    <!-- Ja no s'agafa. És fixa perquè fa 2 metres d'alt! -->
    <a-entity position="0 0 -2.0" generador-muntanya></a-entity>

    <!-- ============================================== -->
    <!-- PANELL DEL JOC (Molt alt per no tapar el cim)  -->
    <!-- ============================================== -->
    <a-entity position="0 2.6 -3.0" rotation="10 0 0">
      
      <!-- Cartell negre opac gegant -->
      <a-plane material="shader: flat; color: #111; transparent: true; opacity: 0.95" width="2.4" height="1.0" border-radius="0.05"></a-plane>
      
      <!-- Títol Tècnic -->
      <a-text value="Laboratori de Topografia i Corbes de Nivell" position="-1.1 0.4 0.01" color="#32CD32" width="2.2" wrap-count="35" baseline="top" font="mozillavr"></a-text>
      
      <!-- OBJECTIU -->
      <a-text id="text-objectiu" value="OBJECTIU:\nTroba la cota 2350m" position="-1.1 0.1 0.01" color="#FFD700" width="1.6" wrap-count="20" baseline="top" font="mozillavr"></a-text>
      
      <!-- INFO I ERRORS -->
      <a-text id="text-info" value="Observa la muntanya.\nLa línia verda del terra són 2000m d'alçada.\nL'equidistància (salt entre línies) és de 50m." position="-1.1 -0.2 0.01" color="white" width="2.2" wrap-count="45" baseline="top" font="mozillavr"></a-text>
      
      <!-- MARCADOR DE PUNTS -->
      <a-text id="text-marcador" value="Punts: 0" position="0.5 0.1 0.01" color="#00FFFF" width="1.4" wrap-count="15" baseline="top" align="right" font="mozillavr"></a-text>
      
    </a-entity>

  </a-scene>

</body>
</html>
