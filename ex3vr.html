<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Repte 3 VR - Simulador Final i Veu</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    let ciutatsVisitades =[];
    let dataSistema = new Date();
    let dataEquinocci = new Date(dataSistema.getFullYear(), 2, 21); 
    
    let tempsActiu = false;
    let velocitatsPermeses =[-50, -30, -10, -5, -2, -1, 1, 2, 5, 10, 30, 50];
    let indexVelocitat = 6; 
    let velocitatTemps = velocitatsPermeses[indexVelocitat]; 
    let diaActual = (dataSistema - dataEquinocci) / (1000 * 60 * 60 * 24); 
    let horaActual = dataSistema.getHours() + (dataSistema.getMinutes() / 60); 
    
    let solEncès = true;
    let ultimEventDisparat = null; 
    let audioCtx = null;

    // --- 1. CONNEXIÓ GOOGLE APPS SCRIPT (Sense CORS error) ---
    // POSA AQUÍ LA TEVA NOVA URL (Assegura't que l'Apps Script té accés: "Qualsevol")
    const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFfZYOpQIbizXiUm0qAm2xR7LZAeT2wrtaE9L95TaTbbe8H7Lalh5nfGMFdNTeSQ1Rmw/exec";

    document.addEventListener("DOMContentLoaded", () => {
      fetch(APPSCRIPT_URL + "?action=getLogo")
        .then(response => response.json())
        .then(data => {
          if (data.logo) {
            document.getElementById('logo-institut').setAttribute('src', data.logo);
            document.getElementById('logo-institut').setAttribute('visible', 'true');
          }
          // El correu arribarà buit si no estan loguejats, posem 'No identificat'
          let email = (data.email && data.email !== "") ? data.email : "Jugador VR (No identificat)";
          document.getElementById('text-usuari').setAttribute('value', `Alumne: ${email}`);
        })
        .catch(error => {
          console.log("Aquest error és normal si l'Apps Script està restringit:", error);
          document.getElementById('text-usuari').setAttribute('value', `Alumne: Jugador VR`);
        });
    });

    // --- 2. DESBLOQUEJADOR DE VEU I SO ---
    let veuDesbloquejada = false;
    // Aquest esdeveniment caça el clic que fas a l'ordinador o el clic a l'ullera per entrar a AR
    document.addEventListener('click', () => {
      if (!veuDesbloquejada && 'speechSynthesis' in window) {
        let msgSilenci = new SpeechSynthesisUtterance('');
        msgSilenci.volume = 0; // Mut
        window.speechSynthesis.speak(msgSilenci);
        veuDesbloquejada = true;
        console.log("Motor de veu despertat pel navegador!");
      }
    }, { once: true });

    function ferBip() {
      if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime); 
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    function parlar(text) {
      if (!veuDesbloquejada) console.warn("La veu no s'ha pogut despertar.");
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        let missatge = new SpeechSynthesisUtterance(text);
        let voices = window.speechSynthesis.getVoices();
        let voice = voices.find(v => v.lang.startsWith('ca')) || voices.find(v => v.lang.startsWith('es'));
        if (voice) missatge.voice = voice;
        missatge.lang = voice ? voice.lang : 'ca-ES';
        window.speechSynthesis.speak(missatge);
      }
    }

    function obtenirDataText(diesAfegits) {
      let dataBase = new Date(dataSistema.getFullYear(), 2, 21); 
      dataBase.setDate(dataBase.getDate() + Math.floor(diesAfegits));
      let dia = dataBase.getDate().toString().padStart(2, '0');
      let mesos =["Gen", "Feb", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Oct", "Nov", "Des"];
      let mes = mesos[dataBase.getMonth()];
      let any = dataBase.getFullYear();
      return { textComplet: `${dia} ${mes} ${any}`, textCurt: `${dia} ${mes}` };
    }

    // --- 3. MOTOR D'INTERACCIÓ ---
    AFRAME.registerComponent('control-pico', {
      init: function () {
        this.comandament = this.el;
        this.planetaPare = document.getElementById('grup-planeta');
        this.solVisual = document.getElementById('el-sol');
        this.llumSol = document.getElementById('llum-direccional');
        this.llumAmbient = document.getElementById('llum-ambient');
        this.planetaAgafat = false;

        window.actualitzarPanellCentral = function(titol, descripcio, imgUrl) {
          document.getElementById('text-panell').setAttribute('value', titol);
          document.getElementById('text-coords').setAttribute('value', descripcio);
          let imgEl = document.getElementById('imatge-panell');
          if (imgUrl && imgUrl !== "null") { imgEl.setAttribute('src', imgUrl); imgEl.setAttribute('visible', 'true'); } 
          else { imgEl.setAttribute('visible', 'false'); }
        }

        window.afegirAHistorialCentral = function(text) {
          if (ciutatsVisitades[ciutatsVisitades.length - 1] !== text) {
            ciutatsVisitades.push(text);
            if (ciutatsVisitades.length > 10) ciutatsVisitades.shift(); 
            document.getElementById('text-historial').setAttribute('value', ciutatsVisitades.map((c, i) => `• ${c}`).join('\n\n'));
          }
        }

        this.comandament.addEventListener('triggerdown', (e) => {
          let tocats = this.comandament.components.raycaster.intersectedEls;
          
          if (tocats.length > 0) {
            let tocat = tocats[0];

            if (tocat.classList.contains('boto-vr')) {
              ferBip();
              batecAnimacio(tocat); 
              let accio = tocat.getAttribute('data-accio');
              
              if (accio === 'sol') {
                solEncès = !solEncès;
                if (solEncès) {
                  tocat.setAttribute('material', 'shader: flat; color: #FFD700');
                  document.getElementById('text-btn-sol').setAttribute('value', 'SOL ON');
                  this.solVisual.setAttribute('visible', 'true');
                  this.llumSol.setAttribute('light', 'intensity', 4.5); 
                  this.llumAmbient.setAttribute('light', 'intensity', 0.15);
                } else {
                  tocat.setAttribute('material', 'shader: flat; color: #555');
                  document.getElementById('text-btn-sol').setAttribute('value', 'SOL OFF');
                  this.solVisual.setAttribute('visible', 'false');
                  this.llumSol.setAttribute('light', 'intensity', 0);
                  this.llumAmbient.setAttribute('light', 'intensity', 1.2); 
                }
              }
              else if (accio === 'play') {
                tempsActiu = !tempsActiu;
                if (tempsActiu) {
                  tocat.setAttribute('material', 'shader: flat; color: #32CD32');
                  document.getElementById('text-btn-play').setAttribute('value', 'PAUSA ||');
                } else {
                  tocat.setAttribute('material', 'shader: flat; color: #1E90FF');
                  document.getElementById('text-btn-play').setAttribute('value', 'PLAY >');
                }
              }
              else if (accio === 'vel-menys') {
                if (indexVelocitat > 0) indexVelocitat--;
                velocitatTemps = velocitatsPermeses[indexVelocitat];
                document.getElementById('text-btn-vel').setAttribute('value', `${velocitatTemps}x`);
              }
              else if (accio === 'vel-mes') {
                if (indexVelocitat < velocitatsPermeses.length - 1) indexVelocitat++;
                velocitatTemps = velocitatsPermeses[indexVelocitat];
                document.getElementById('text-btn-vel').setAttribute('value', `${velocitatTemps}x`);
              }
            }

            else if (tocat.classList.contains('esfera-terra') && !tempsActiu) {
              this.planetaAgafat = true;
              this.comandament.object3D.attach(this.planetaPare.object3D);
            }

            else if (tocat.classList.contains('pin-ciutat')) {
              ferBip();
              let nomCiutat = tocat.getAttribute('data-nom');
              let lat = Math.round(tocat.getAttribute('data-lat'));
              parlar(nomCiutat + ". Latitud " + lat + " graus."); 
              
              let latC = Math.abs(tocat.getAttribute('data-lat')).toFixed(1) + (tocat.getAttribute('data-lat') >= 0 ? ' N' : ' S');
              let lonC = Math.abs(tocat.getAttribute('data-lon')).toFixed(1) + (tocat.getAttribute('data-lon') >= 0 ? ' E' : ' O');
              
              window.actualitzarPanellCentral("📍 " + nomCiutat, `Coordenades:\n[ Lat: ${latC}  |  Lon: ${lonC} ]\n\n${tocat.getAttribute('data-extra')}`, tocat.getAttribute('data-img'));
              batecAnimacio(tocat);
              window.afegirAHistorialCentral(nomCiutat);
            }

            else if (tocat.classList.contains('linia-important')) {
              ferBip();
              let nomLinia = tocat.getAttribute('data-nom');
              parlar(nomLinia); 

              window.actualitzarPanellCentral("➖ " + nomLinia, tocat.getAttribute('data-info'), "null");
              let liniaVisual = tocat.liniaVisualAssociada;
              if (liniaVisual) {
                let colorOriginal = tocat.colorOriginal;
                liniaVisual.setAttribute('color', 'white');
                setTimeout(() => { liniaVisual.setAttribute('color', colorOriginal); }, 400);
              }
            }
          }
        });

        this.comandament.addEventListener('triggerup', (e) => {
          if (this.planetaAgafat) {
            this.comandament.sceneEl.object3D.attach(this.planetaPare.object3D);
            this.planetaAgafat = false;
          }
        });

        function batecAnimacio(el) {
          el.setAttribute('scale', '1.3 1.3 1.3');
          setTimeout(() => { el.setAttribute('scale', '1 1 1'); }, 200);
        }
      },

      tick: function (time, timeDelta) {
        if (tempsActiu) {
          horaActual += (timeDelta / 1000) * velocitatTemps; 
          while (horaActual >= 24) { horaActual -= 24; diaActual++; }
          while (horaActual < 0) { horaActual += 24; diaActual--; }
        }

        let terraObj = document.getElementById('esfera-terra-real').object3D;
        terraObj.rotation.y = (horaActual - 12) * (15 * Math.PI / 180);

        let angleAny = (diaActual / 365.25) * 2 * Math.PI;
        let inclinacioZ = 23.5 * Math.sin(angleAny); 
        document.getElementById('eix-terra').object3D.rotation.z = -inclinacioZ * (Math.PI / 180);

        let diaNormalitzat = ((Math.floor(diaActual) % 365) + 365) % 365;
        let eventActiu = null;

        if (diaNormalitzat >= 363 || diaNormalitzat <= 1) eventActiu = { id: 1, nom: "Equinocci de Primavera", desc: "El Sol cau vertical sobre l'Equador.\nEl dia i la nit duren 12 hores iguals." };
        else if (diaNormalitzat >= 90 && diaNormalitzat <= 93) eventActiu = { id: 2, nom: "Solstici d'Estiu", desc: "La màxima inclinació cap al Sol.\nL'Àrtic té Sol les 24 hores." };
        else if (diaNormalitzat >= 183 && diaNormalitzat <= 186) eventActiu = { id: 3, nom: "Equinocci de Tardor", desc: "El Sol torna a l'Equador.\nInici de la tardor a l'hemisferi nord." };
        else if (diaNormalitzat >= 273 && diaNormalitzat <= 276) eventActiu = { id: 4, nom: "Solstici d'Hivern", desc: "El Pol Nord s'amaga del Sol.\nDia més curt de l'any a Lleida." };

        let dataActualObjecte = obtenirDataText(diaActual);

        if (eventActiu && eventActiu.id !== ultimEventDisparat) {
          ultimEventDisparat = eventActiu.id;
          parlar(eventActiu.nom); 
          window.actualitzarPanellCentral("🌟 " + eventActiu.nom, `Data: ${dataActualObjecte.textComplet}\n\n${eventActiu.desc}`, "null");
          window.afegirAHistorialCentral(`${dataActualObjecte.textCurt} - ${eventActiu.nom}`);
        } else if (!eventActiu) { ultimEventDisparat = null; }

        document.getElementById('text-dia').setAttribute('value', dataActualObjecte.textComplet);
        let hFormat = Math.floor(Math.abs(horaActual)).toString().padStart(2, '0');
        let mFormat = Math.floor((Math.abs(horaActual) % 1) * 60).toString().padStart(2, '0');
        document.getElementById('text-hora').setAttribute('value', `${hFormat}:${mFormat}`);
      }
    });

    AFRAME.registerComponent('marcadors-terra', {
      init: function () {
        const planeta = this.el;
        const R = 0.5; 

        function afegirLinia(nom, info, lat, color, rotacio) {
          let latRad = lat * Math.PI / 180;
          let r = R * Math.cos(latRad); 
          let y = R * Math.sin(latRad); 
          const liniaVis = document.createElement('a-torus');
          liniaVis.setAttribute('radius', r + 0.001); 
          liniaVis.setAttribute('radius-tubular', 0.0015);
          liniaVis.setAttribute('color', color);
          liniaVis.setAttribute('rotation', rotacio || '90 0 0'); 
          liniaVis.setAttribute('position', `0 ${y} 0`); 
          liniaVis.setAttribute('material', 'shader: flat'); 
          planeta.appendChild(liniaVis);

          const hitbox = document.createElement('a-torus');
          hitbox.classList.add('linia-important');
          hitbox.setAttribute('radius', r + 0.001); 
          hitbox.setAttribute('radius-tubular', 0.025); 
          hitbox.setAttribute('material', 'transparent: true; opacity: 0.0; depthWrite: false'); 
          hitbox.setAttribute('rotation', rotacio || '90 0 0'); 
          hitbox.setAttribute('position', `0 ${y} 0`); 
          hitbox.setAttribute('data-nom', nom);
          hitbox.setAttribute('data-info', info);
          hitbox.liniaVisualAssociada = liniaVis;
          hitbox.colorOriginal = color;
          planeta.appendChild(hitbox);
        }

        afegirLinia("Equador", "Latitud 0°.\nDivideix la Terra en Nord i Sud.", 0, "yellow");
        afegirLinia("Tròpic de Càncer", "Latitud 23.5° N.\nLímit de llum vertical a l'estiu.", 23.5, "orange");
        afegirLinia("Tròpic de Capricorn", "Latitud -23.5° S.\nLímit de llum vertical a l'hivern.", -23.5, "orange");
        afegirLinia("Cercle Polar Àrtic", "Latitud 66.5° N.\nZona de sol de mitjanit o nit polar.", 66.5, "cyan");
        afegirLinia("Cercle Polar Antàrtic", "Latitud -66.5° S.\nZona de sol de mitjanit o nit polar.", -66.5, "cyan");
        afegirLinia("Meridià de Greenwich", "Longitud 0°.\nReferència global de les hores.", 0, "lime", "0 90 0");

        this.afegirMarcador = function(nom, lat, lon, color, infoExtra, imatgeUrl) {
          let offsetTextura = -90; 
          let latRad = lat * Math.PI / 180;
          let lonRad = (lon + offsetTextura) * Math.PI / 180; 
          let R_exterior = R + 0.008; 
          let x = -R_exterior * Math.cos(latRad) * Math.sin(lonRad);
          let y =  R_exterior * Math.sin(latRad);
          let z = -R_exterior * Math.cos(latRad) * Math.cos(lonRad);
          
          const punt = document.createElement('a-sphere');
          punt.classList.add('pin-ciutat'); 
          punt.setAttribute('radius', 0.008);
          punt.setAttribute('color', color);
          punt.setAttribute('position', `${x} ${y} ${z}`);
          punt.setAttribute('material', 'shader: flat'); 
          punt.setAttribute('data-nom', nom);
          punt.setAttribute('data-lat', lat);
          punt.setAttribute('data-lon', lon);
          punt.setAttribute('data-extra', infoExtra);
          punt.setAttribute('data-img', imatgeUrl);
          planeta.appendChild(punt);
        }

        this.afegirMarcador("Lleida", 41.61, 0.61, "red", "Fixa't on som respecte a l'Equador.", "lleida.jpg");
        this.afegirMarcador("Nova York", 40.71, -74.00, "cyan", "Estats Units.", "null");
        this.afegirMarcador("Sydney", -33.86, 151.20, "magenta", "Austràlia.", "null");
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <a-light id="llum-ambient" type="ambient" color="#FFF" intensity="0.15"></a-light>
    <a-assets><img id="mapa-terra" src="earth.jpg"><img id="img-lleida" src="lleida.jpg"></a-assets>

    <a-entity laser-controls="hand: left" raycaster="objects: .esfera-terra, .pin-ciutat, .linia-important, .boto-vr; far: 5" control-pico></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .esfera-terra, .pin-ciutat, .linia-important, .boto-vr; far: 5" control-pico></a-entity>

    <!-- GRUP PRINCIPAL -->
    <a-entity id="grup-planeta" position="0 1.2 -1.5">
        <a-entity id="eix-terra">
          <a-entity id="esfera-terra-real">
            <a-sphere class="esfera-terra" src="#mapa-terra" marcadors-terra radius="0.5" material="shader: standard; roughness: 0.9; metalness: 0.0;"></a-sphere>
          </a-entity>
        </a-entity>
        <a-sphere id="el-sol" radius="0.08" color="#FFF200" material="shader: flat" position="1.5 0 0"></a-sphere>
        <a-entity id="objectiu-llum" position="0 0 0"></a-entity>
        <a-light id="llum-direccional" type="directional" color="#FFF4D4" intensity="4.5" position="1.5 0 0" target="#objectiu-llum"></a-light>
    </a-entity>

    <!-- CONSOLA CENTRAL -->
    <a-entity position="0 0.40 -1.2" rotation="-20 0 0">
      <a-plane material="shader: flat; color: #1a1a1a; transparent: true; opacity: 0.95" width="2.6" height="0.6" border-radius="0.05"></a-plane>
      <a-text id="text-dia" value="" position="-0.7 0.15 0.01" color="#00FFFF" align="center" width="1.6" wrap-count="15" font="mozillavr"></a-text>
      <a-text id="text-hora" value="" position="0.7 0.15 0.01" color="#FFD700" align="center" width="1.2" wrap-count="10" font="mozillavr"></a-text>

      <a-plane class="boto-vr" data-accio="sol" material="shader: flat; color: #FFD700" position="-0.8 -0.15 0.01" width="0.4" height="0.18" border-radius="0.02">
        <a-text id="text-btn-sol" value="SOL ON" align="center" position="0 0 0.01" color="black" width="0.3" wrap-count="8" font="mozillavr"></a-text>
      </a-plane>

      <a-plane class="boto-vr" data-accio="play" material="shader: flat; color: #1E90FF" position="-0.3 -0.15 0.01" width="0.4" height="0.18" border-radius="0.02">
        <a-text id="text-btn-play" value="PLAY >" align="center" position="0 0 0.01" color="white" width="0.3" wrap-count="8" font="mozillavr"></a-text>
      </a-plane>

      <a-plane class="boto-vr" data-accio="vel-menys" material="shader: flat; color: #FF4500" position="0.25 -0.15 0.01" width="0.2" height="0.18" border-radius="0.02">
        <a-text value="-" align="center" position="0 0.01 0.01" color="white" width="0.15" wrap-count="3" font="mozillavr"></a-text>
      </a-plane>

      <a-text id="text-btn-vel" value="1x" align="center" position="0.55 -0.15 0.01" color="white" width="0.8" wrap-count="5" font="mozillavr"></a-text>

      <a-plane class="boto-vr" data-accio="vel-mes" material="shader: flat; color: #FF4500" position="0.85 -0.15 0.01" width="0.2" height="0.18" border-radius="0.02">
        <a-text value="+" align="center" position="0 0.01 0.01" color="white" width="0.15" wrap-count="3" font="mozillavr"></a-text>
      </a-plane>
    </a-entity>

    <!-- LOGO I CORREU -->
    <a-entity position="0 0.0 -1.2" rotation="-20 0 0">
      <a-image id="logo-institut" src="" position="-0.7 0 0.01" width="0.25" height="0.25" visible="false"></a-image>
      <a-text id="text-usuari" value="Connectant amb Google..." position="-0.5 0 0.01" baseline="center" color="#00FF7F" width="1.5" wrap-count="30" font="mozillavr"></a-text>
    </a-entity>

    <!-- PANELLS LATERALS -->
    <a-entity id="panell-info" position="1.8 1.6 -3.0" rotation="0 -35 0">
      <a-plane material="shader: flat; color: #111; transparent: true; opacity: 0.9" width="1.6" height="1.4" border-radius="0.05"></a-plane>
      <a-text id="text-panell" value="Simulador Orbital" position="-0.7 0.60 0.01" baseline="top" color="#F0E68C" width="1.4" wrap-count="22" font="mozillavr"></a-text>
      <a-text id="text-coords" value="La Terra s'ha sincronitzat amb el dia i l'hora reals.\n\nActiva la veu! Clica les línies." position="-0.7 0.40 0.01" baseline="top" color="white" width="1.4" wrap-count="35" font="mozillavr"></a-text>
      <a-image id="imatge-panell" src="" position="0 -0.2 0.02" width="1.2" height="0.6" visible="false"></a-image>
    </a-entity>

    <a-entity id="panell-historial" position="-1.8 1.6 -3.0" rotation="0 35 0">
      <a-plane material="shader: flat; color: #111; transparent: true; opacity: 0.9" width="1.6" height="1.4" border-radius="0.05"></a-plane>
      <a-text value="Historial d'Esdeveniments" position="-0.7 0.60 0.01" baseline="top" color="#00FF7F" width="1.4" wrap-count="25" font="mozillavr"></a-text>
      <a-text id="text-historial" value="Encara no hi ha dades." position="-0.7 0.40 0.01" baseline="top" color="white" width="1.4" wrap-count="40" font="mozillavr"></a-text>
    </a-entity>

  </a-scene>

</body>
</html>
