<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Repte 3 VR - Maqueta Completa</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    let ciutatsVisitades =[];

    // 1. MOTOR D'INTERACCIÓ
    AFRAME.registerComponent('control-pico', {
      init: function () {
        let comandament = this.el;
        let planetaAgafat = null;

        comandament.addEventListener('triggerdown', function () {
          let tocats = comandament.components.raycaster.intersectedEls;
          
          if (tocats.length > 0) {
            let tocat = tocats[0];

            if (tocat.classList.contains('esfera-terra')) {
              planetaAgafat = tocat;
              planetaAgafat.removeAttribute('animation');
              comandament.object3D.attach(planetaAgafat.object3D);
            } 
            else if (tocat.classList.contains('pin-ciutat')) {
              let nom = tocat.getAttribute('data-nom');
              let lat = tocat.getAttribute('data-lat');
              let lon = tocat.getAttribute('data-lon');
              let extra = tocat.getAttribute('data-extra');
              let imatgeUrl = tocat.getAttribute('data-img');

              // A) ACTUALITZEM EL PANELL PRINCIPAL (DRETA)
              document.getElementById('text-panell').setAttribute('value', "📍 " + nom);
              document.getElementById('text-coords').setAttribute('value', `Latitud: ${lat}°\nLongitud: ${lon}°\n\n${extra}`);
              
              let imgEl = document.getElementById('imatge-panell');
              if (imatgeUrl && imatgeUrl !== "null") {
                // Carreguem la imatge local del GitHub
                imgEl.setAttribute('src', imatgeUrl);
                imgEl.setAttribute('visible', 'true');
              } else {
                imgEl.setAttribute('visible', 'false'); 
              }
              
              tocat.setAttribute('scale', '1.5 1.5 1.5');
              setTimeout(() => { tocat.setAttribute('scale', '1 1 1'); }, 300);

              // B) ACTUALITZEM L'HISTORIAL (ESQUERRA)
              if (!ciutatsVisitades.includes(nom)) {
                ciutatsVisitades.push(`${nom} (${lat}, ${lon})`);
                if (ciutatsVisitades.length > 6) { ciutatsVisitades.shift(); }
                
                let textLlista = ciutatsVisitades.map((c, i) => `${i+1}. ${c}`).join('\n');
                document.getElementById('text-historial').setAttribute('value', textLlista);
              }
            }
          }
        });

        comandament.addEventListener('triggerup', function () {
          if (planetaAgafat) {
            comandament.sceneEl.object3D.attach(planetaAgafat.object3D);
            planetaAgafat = null;
          }
        });
      }
    });

    // 2. CONSTRUCTOR MATEMÀTIC
    AFRAME.registerComponent('marcadors-terra', {
      init: function () {
        const planeta = this.el;
        const R = 0.5; 

        // Línies guia
        const equador = document.createElement('a-torus');
        equador.setAttribute('radius', R + 0.001); 
        equador.setAttribute('radius-tubular', 0.001);
        equador.setAttribute('color', 'yellow');
        equador.setAttribute('rotation', '90 0 0'); 
        planeta.appendChild(equador);

        const meridian = document.createElement('a-torus');
        meridian.setAttribute('radius', R + 0.001);
        meridian.setAttribute('radius-tubular', 0.001);
        meridian.setAttribute('color', 'lime');
        meridian.setAttribute('rotation', '0 90 0'); 
        planeta.appendChild(meridian);

        this.afegirMarcador = function(nom, lat, lon, color, infoExtra, imatgeUrl) {
          // CORRECCIÓ DEL DESFASAMENT: Ara restem 90 graus perquè vagi a l'oest!
          let offsetTextura = -90; 
          let latRad = lat * Math.PI / 180;
          let lonRad = (lon + offsetTextura) * Math.PI / 180; 
          
          let radiXinxeta = 0.008; 
          let R_exterior = R + radiXinxeta; 
          
          let x = -R_exterior * Math.cos(latRad) * Math.sin(lonRad);
          let y =  R_exterior * Math.sin(latRad);
          let z = -R_exterior * Math.cos(latRad) * Math.cos(lonRad);
          
          const punt = document.createElement('a-sphere');
          punt.classList.add('pin-ciutat'); 
          punt.setAttribute('radius', radiXinxeta);
          punt.setAttribute('color', color);
          punt.setAttribute('position', `${x} ${y} ${z}`);
          
          punt.setAttribute('data-nom', nom);
          punt.setAttribute('data-lat', lat);
          punt.setAttribute('data-lon', lon);
          punt.setAttribute('data-extra', infoExtra);
          punt.setAttribute('data-img', imatgeUrl);

          planeta.appendChild(punt);
        }

        // ====== CIUTATS ======
        // Ara Lleida crida directament l'arxiu lleida.jpg que has pujat al teu GitHub!
        this.afegirMarcador("Lleida", 41.61, 0.61, "red", "Capital de la Terra Ferma.", "lleida.jpg");
        this.afegirMarcador("Nova York", 40.71, -74.00, "cyan", "Estats Units.", "null");
        this.afegirMarcador("Sydney", -33.86, 151.20, "orange", "Austràlia.", "null");
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <a-assets>
      <img id="mapa-terra" src="earth.jpg">
      <!-- És recomanable precarregar la imatge aquí perquè vagi ràpid quan cliquin -->
      <img id="img-lleida" src="lleida.jpg">
    </a-assets>

    <!-- COMANDAMENTS -->
    <a-entity laser-controls="hand: left" raycaster="objects: .esfera-terra, .pin-ciutat; far: 5" control-pico></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .esfera-terra, .pin-ciutat; far: 5" control-pico></a-entity>

    <!-- EL PLANETA -->
    <a-sphere 
      id="planeta"
      class="esfera-terra"
      src="#mapa-terra" 
      marcadors-terra
      radius="0.5" 
      position="0 1.2 -1.5" 
      material="roughness: 0.8;"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
    </a-sphere>

    <!-- 1. PANELL D'INFORMACIÓ PRINCIPAL (DRETA) -->
    <a-entity id="panell-info" position="0.8 1.4 -1.5" rotation="0 -15 0">
      <a-plane color="#111" opacity="0.8" width="0.8" height="0.8" border-radius="0.05"></a-plane>
      <a-text id="text-panell" value="Apunta i clica\nuna ciutat" position="-0.35 0.30 0.01" color="#F0E68C" width="1.5" font="mozillavr"></a-text>
      <a-text id="text-coords" value="Fes servir el làser per\ntocar un punt de colors." position="-0.35 0.10 0.01" color="white" width="1.2"></a-text>
      <!-- REQUADRE IMATGE -->
      <a-image id="imatge-panell" src="" position="0 -0.15 0.02" width="0.7" height="0.4" visible="false"></a-image>
    </a-entity>

    <!-- 2. PANELL D'HISTORIAL (ESQUERRA) -->
    <a-entity id="panell-historial" position="-0.8 1.4 -1.5" rotation="0 15 0">
      <a-plane color="#111" opacity="0.8" width="0.7" height="0.6" border-radius="0.05"></a-plane>
      <a-text value="Historial de Visites" position="-0.30 0.20 0.01" color="#00FF7F" width="1.4" font="mozillavr"></a-text>
      <a-text id="text-historial" value="Encara no has visitat\ncap ciutat." position="-0.30 0.05 0.01" color="white" width="1.2"></a-text>
    </a-entity>

  </a-scene>

</body>
</html>
