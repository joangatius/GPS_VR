<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Repte 3 VR - Simulador Astronòmic</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    let ciutatsVisitades =[];
    
    // VARIABLES DEL TEMPS I ÒRBITA
    let tempsActiu = false;
    let velocitatTemps = 5; // Comencem a 5x
    let diaActual = 92; // 21 de Juny (Solstici d'Estiu Nord)
    let horaActual = 12; 
    let solEncès = true;

    function obtenirDataText(diesAfegits) {
      let dataBase = new Date(2026, 2, 21); 
      dataBase.setDate(dataBase.getDate() + Math.floor(diesAfegits));
      let dia = dataBase.getDate().toString().padStart(2, '0');
      let mesos =["Gen", "Feb", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Oct", "Nov", "Des"];
      let mes = mesos[dataBase.getMonth()];
      let any = dataBase.getFullYear();
      return `${dia} ${mes} ${any}`;
    }

    // 1. MOTOR GENERAL D'INTERACCIÓ
    AFRAME.registerComponent('control-pico', {
      init: function () {
        this.comandament = this.el;
        this.planetaPare = document.getElementById('grup-planeta');
        this.solVisual = document.getElementById('el-sol');
        this.llumSol = document.getElementById('llum-direccional');
        
        this.planetaAgafat = false;

        this.comandament.addEventListener('triggerdown', (e) => {
          let tocats = this.comandament.components.raycaster.intersectedEls;
          
          if (tocats.length > 0) {
            let tocat = tocats[0];

            // --- CONSOLA DE COMANDAMENT ---
            if (tocat.classList.contains('boto-vr')) {
              batecAnimacio(tocat); 
              let accio = tocat.getAttribute('data-accio');
              
              if (accio === 'sol') {
                solEncès = !solEncès;
                if (solEncès) {
                  tocat.setAttribute('material', 'shader: flat; color: #FFD700');
                  document.getElementById('text-btn-sol').setAttribute('value', 'SOL ON');
                  this.solVisual.setAttribute('visible', 'true');
                  this.llumSol.setAttribute('intensity', '4.5'); 
                  document.getElementById('llum-ambient').setAttribute('intensity', '0.15');
                } else {
                  tocat.setAttribute('material', 'shader: flat; color: #555');
                  document.getElementById('text-btn-sol').setAttribute('value', 'SOL OFF');
                  this.solVisual.setAttribute('visible', 'false');
                  this.llumSol.setAttribute('intensity', '0');
                  document.getElementById('llum-ambient').setAttribute('intensity', '1.2'); 
                }
              }
              else if (accio === 'play') {
                tempsActiu = !tempsActiu;
                if (tempsActiu) {
                  tocat.setAttribute('material', 'shader: flat; color: #32CD32');
                  document.getElementById('text-btn-play').setAttribute('value', 'PAUSA ||');
                } else {
                  tocat.setAttribute('material', 'shader: flat; color: #1E90FF');
                  document.getElementById('text-btn-play').setAttribute('value', 'PLAY >');
                }
              }
              else if (accio === 'vel-menys') {
                velocitatTemps -= 5;
                if (velocitatTemps === 0) velocitatTemps = -5; // Saltem el 0
                if (velocitatTemps < -30) velocitatTemps = -30; // Límit -30x
                document.getElementById('text-btn-vel').setAttribute('value', `${velocitatTemps}x`);
              }
              else if (accio === 'vel-mes') {
                velocitatTemps += 5;
                if (velocitatTemps === 0) velocitatTemps = 5; // Saltem el 0
                if (velocitatTemps > 30) velocitatTemps = 30; // Límit 30x
                document.getElementById('text-btn-vel').setAttribute('value', `${velocitatTemps}x`);
              }
            }

            // --- AGAFAR LA TERRA ---
            else if (tocat.classList.contains('esfera-terra') && !tempsActiu) {
              this.planetaAgafat = true;
              this.comandament.object3D.attach(this.planetaPare.object3D);
            }

            // --- LECTURA CIUTATS ---
            else if (tocat.classList.contains('pin-ciutat')) {
              actualitzarPanell("📍 " + tocat.getAttribute('data-nom'), `Latitud: ${tocat.getAttribute('data-lat')}°\nLongitud: ${tocat.getAttribute('data-lon')}°\n\n${tocat.getAttribute('data-extra')}`, tocat.getAttribute('data-img'));
              batecAnimacio(tocat);
              afegirAHistorial(tocat.getAttribute('data-nom'));
            }

            // --- LECTURA LÍNIES ---
            else if (tocat.classList.contains('linia-important')) {
              actualitzarPanell("➖ " + tocat.getAttribute('data-nom'), tocat.getAttribute('data-info'), "null");
              let liniaVisual = tocat.liniaVisualAssociada;
              if (liniaVisual) {
                let colorOriginal = tocat.colorOriginal;
                liniaVisual.setAttribute('color', 'white');
                setTimeout(() => { liniaVisual.setAttribute('color', colorOriginal); }, 400);
              }
            }
          }
        });

        this.comandament.addEventListener('triggerup', (e) => {
          if (this.planetaAgafat) {
            this.comandament.sceneEl.object3D.attach(this.planetaPare.object3D);
            this.planetaAgafat = false;
          }
        });

        function actualitzarPanell(titol, descripcio, imgUrl) {
          document.getElementById('text-panell').setAttribute('value', titol);
          document.getElementById('text-coords').setAttribute('value', descripcio);
          let imgEl = document.getElementById('imatge-panell');
          if (imgUrl && imgUrl !== "null") { imgEl.setAttribute('src', imgUrl); imgEl.setAttribute('visible', 'true'); } 
          else { imgEl.setAttribute('visible', 'false'); }
        }
        function batecAnimacio(el) {
          el.setAttribute('scale', '1.3 1.3 1.3');
          setTimeout(() => { el.setAttribute('scale', '1 1 1'); }, 200);
        }
        function afegirAHistorial(nom) {
          if (!ciutatsVisitades.includes(nom)) {
            ciutatsVisitades.push(nom);
            if (ciutatsVisitades.length > 7) ciutatsVisitades.shift();
            document.getElementById('text-historial').setAttribute('value', ciutatsVisitades.map((c, i) => `${i+1}. ${c}`).join('\n'));
          }
        }
      },

      // BUCLE EXECUTAT 90 COPS PER SEGON (Inclinació i Rellotges)
      tick: function (time, timeDelta) {
        if (tempsActiu) {
          horaActual += (timeDelta / 1000) * velocitatTemps; 
          while (horaActual >= 24) { horaActual -= 24; diaActual++; }
          while (horaActual < 0) { horaActual += 24; diaActual--; }
        }

        // 1. Rotació de la Terra sobre si mateixa
        let terraObj = document.getElementById('esfera-terra-real').object3D;
        terraObj.rotation.y = horaActual * (15 * Math.PI / 180);

        // 2. Inclinació de l'Eix (Sol quiet a la dreta)
        let angleAny = (diaActual / 365.25) * 2 * Math.PI;
        let inclinacioZ = 23.5 * Math.sin(angleAny); 
        document.getElementById('eix-terra').object3D.rotation.z = -inclinacioZ * (Math.PI / 180);

        // 3. Rellotges Digitals
        document.getElementById('text-dia').setAttribute('value', obtenirDataText(diaActual));
        let hFormat = Math.floor(Math.abs(horaActual)).toString().padStart(2, '0');
        let mFormat = Math.floor((Math.abs(horaActual) % 1) * 60).toString().padStart(2, '0');
        document.getElementById('text-hora').setAttribute('value', `${hFormat}:${mFormat}`);
      }
    });

    // 2. CONSTRUCTOR MATEMÀTIC
    AFRAME.registerComponent('marcadors-terra', {
      init: function () {
        const planeta = this.el;
        const R = 0.5; 

        function afegirLinia(nom, info, lat, color, rotacio) {
          let latRad = lat * Math.PI / 180;
          let r = R * Math.cos(latRad); 
          let y = R * Math.sin(latRad); 

          const liniaVis = document.createElement('a-torus');
          liniaVis.setAttribute('radius', r + 0.001); 
          liniaVis.setAttribute('radius-tubular', 0.0015);
          liniaVis.setAttribute('color', color);
          liniaVis.setAttribute('rotation', rotacio || '90 0 0'); 
          liniaVis.setAttribute('position', `0 ${y} 0`); 
          liniaVis.setAttribute('material', 'shader: flat'); 
          planeta.appendChild(liniaVis);

          const hitbox = document.createElement('a-torus');
          hitbox.classList.add('linia-important');
          hitbox.setAttribute('radius', r + 0.001); 
          hitbox.setAttribute('radius-tubular', 0.02); 
          hitbox.setAttribute('material', 'transparent: true; opacity: 0'); 
          hitbox.setAttribute('rotation', rotacio || '90 0 0'); 
          hitbox.setAttribute('position', `0 ${y} 0`); 
          hitbox.setAttribute('data-nom', nom);
          hitbox.setAttribute('data-info', info);
          
          hitbox.liniaVisualAssociada = liniaVis;
          hitbox.colorOriginal = color;
          planeta.appendChild(hitbox);
        }

        afegirLinia("Equador", "Latitud 0°.\nDivideix la Terra en Nord i Sud.", 0, "yellow");
        afegirLinia("Tròpic de Càncer", "Latitud 23.5° N.\nLímit de llum vertical a l'estiu.", 23.5, "orange");
        afegirLinia("Tròpic de Capricorn", "Latitud -23.5° S.\nLímit de llum vertical a l'hivern.", -23.5, "orange");
        afegirLinia("Cercle Polar Àrtic", "Latitud 66.5° N.\nZona de sol de mitjanit o nit polar.", 66.5, "cyan");
        afegirLinia("Cercle Polar Antàrtic", "Latitud -66.5° S.\nZona de sol de mitjanit o nit polar.", -66.5, "cyan");
        afegirLinia("Meridià de Greenwich", "Longitud 0°.\nReferència global de les hores.", 0, "lime", "0 90 0");

        this.afegirMarcador = function(nom, lat, lon, color, infoExtra, imatgeUrl) {
          let offsetTextura = -90; 
          let latRad = lat * Math.PI / 180;
          let lonRad = (lon + offsetTextura) * Math.PI / 180; 
          let R_exterior = R + 0.008; 
          let x = -R_exterior * Math.cos(latRad) * Math.sin(lonRad);
          let y =  R_exterior * Math.sin(latRad);
          let z = -R_exterior * Math.cos(latRad) * Math.cos(lonRad);
          
          const punt = document.createElement('a-sphere');
          punt.classList.add('pin-ciutat'); 
          punt.setAttribute('radius', 0.008);
          punt.setAttribute('color', color);
          punt.setAttribute('position', `${x} ${y} ${z}`);
          punt.setAttribute('material', 'shader: flat'); 
          punt.setAttribute('data-nom', nom);
          punt.setAttribute('data-lat', lat);
          punt.setAttribute('data-lon', lon);
          punt.setAttribute('data-extra', infoExtra);
          punt.setAttribute('data-img', imatgeUrl);
          planeta.appendChild(punt);
        }

        this.afegirMarcador("Lleida", 41.61, 0.61, "red", "Zona temperada Nord.", "lleida.jpg");
        this.afegirMarcador("Nova York", 40.71, -74.00, "cyan", "Estats Units.", "null");
        this.afegirMarcador("Sydney", -33.86, 151.20, "magenta", "Austràlia.", "null");
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <a-light id="llum-ambient" type="ambient" color="#FFF" intensity="0.15"></a-light>

    <a-assets>
      <img id="mapa-terra" src="earth.jpg">
      <img id="img-lleida" src="lleida.jpg">
    </a-assets>

    <a-entity laser-controls="hand: left" raycaster="objects: .esfera-terra, .pin-ciutat, .linia-important, .boto-vr; far: 5" control-pico></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .esfera-terra, .pin-ciutat, .linia-important, .boto-vr; far: 5" control-pico></a-entity>

    <!-- GRUP PRINCIPAL -->
    <a-entity id="grup-planeta" position="0 1.2 -1.5">
        
        <a-entity id="eix-terra">
          <a-entity id="esfera-terra-real">
            <a-sphere class="esfera-terra" src="#mapa-terra" marcadors-terra radius="0.5" material="shader: standard; roughness: 0.9; metalness: 0.0;"></a-sphere>
          </a-entity>
        </a-entity>

        <a-sphere id="el-sol" radius="0.08" color="#FFF200" material="shader: flat" position="1.5 0 0"></a-sphere>
        <a-entity id="objectiu-llum" position="0 0 0"></a-entity>
        <a-light id="llum-direccional" type="directional" color="#FFF4D4" intensity="4.5" position="1.5 0 0" target="#objectiu-llum"></a-light>
    </a-entity>

    <!-- ============================================== -->
    <!-- CONSOLA CORREGIDA I NETEJADA                   -->
    <!-- ============================================== -->
    <a-entity position="0 0.40 -1.2" rotation="-20 0 0">
      
      <!-- Fons pla autoluminós. L'hem fet de 2 metres d'ample -->
      <a-plane material="shader: flat; color: #1a1a1a; transparent: true; opacity: 0.95" width="2.0" height="0.5" border-radius="0.05"></a-plane>
      
      <!-- DATA I HORA. Hem fixat un ample màxim (width="4") perquè NO desbordin -->
      <a-text id="text-dia" value="21 Jun 2026" position="-0.90 0.12 0.01" color="#00FFFF" width="4" align="left" font="mozillavr"></a-text>
      <a-text id="text-hora" value="12:00" position="0.90 0.12 0.01" color="#FFD700" width="5.5" align="right" font="mozillavr"></a-text>

      <!-- BOTONS (Posicionats meticulosament) -->
      <!-- [ SOL ] -->
      <a-plane class="boto-vr" data-accio="sol" material="shader: flat; color: #FFD700" position="-0.7 -0.12 0.01" width="0.3" height="0.15" border-radius="0.02">
        <a-text id="text-btn-sol" value="SOL ON" align="center" position="0 0 0.01" color="black" wrap-count="8" width="0.25" font="mozillavr"></a-text>
      </a-plane>

      <!-- [ PLAY ] -->
      <a-plane class="boto-vr" data-accio="play" material="shader: flat; color: #1E90FF" position="-0.3 -0.12 0.01" width="0.3" height="0.15" border-radius="0.02">
        <a-text id="text-btn-play" value="PLAY >" align="center" position="0 0 0.01" color="white" wrap-count="8" width="0.25" font="mozillavr"></a-text>
      </a-plane>

      <!-- [ - ] -->
      <a-plane class="boto-vr" data-accio="vel-menys" material="shader: flat; color: #FF4500" position="0.15 -0.12 0.01" width="0.15" height="0.15" border-radius="0.02">
        <a-text value="-" align="center" position="0 0.01 0.01" color="white" wrap-count="3" width="0.1" font="mozillavr"></a-text>
      </a-plane>

      <!-- TEXT VELOCITAT -->
      <a-text id="text-btn-vel" value="5x" align="center" position="0.4 -0.12 0.01" color="white" width="3" font="mozillavr"></a-text>

      <!-- [ + ] -->
      <a-plane class="boto-vr" data-accio="vel-mes" material="shader: flat; color: #FF4500" position="0.65 -0.12 0.01" width="0.15" height="0.15" border-radius="0.02">
        <a-text value="+" align="center" position="0 0.01 0.01" color="white" wrap-count="3" width="0.1" font="mozillavr"></a-text>
      </a-plane>

    </a-entity>

    <!-- ============================================== -->
    <!-- PANELLS LATERALS                               -->
    <!-- ============================================== -->
    <a-entity id="panell-info" position="1.3 1.5 -2.5" rotation="0 -30 0">
      <a-plane material="shader: flat; color: #111; transparent: true; opacity: 0.8" width="0.9" height="0.9" border-radius="0.05"></a-plane>
      <a-text id="text-panell" value="Simulador Orbital" position="-0.40 0.35 0.01" color="#F0E68C" width="1.6" font="mozillavr"></a-text>
      <a-text id="text-coords" value="Utilitza els botons inferiors\nper jugar amb el temps\ni la llum del Sol." position="-0.40 0.15 0.01" color="white" width="1.3"></a-text>
      <a-image id="imatge-panell" src="" position="0 -0.20 0.02" width="0.8" height="0.45" visible="false"></a-image>
    </a-entity>

    <a-entity id="panell-historial" position="-1.3 1.5 -2.5" rotation="0 30 0">
      <a-plane material="shader: flat; color: #111; transparent: true; opacity: 0.8" width="0.8" height="0.7" border-radius="0.05"></a-plane>
      <a-text value="Historial de Visites" position="-0.35 0.25 0.01" color="#00FF7F" width="1.5" font="mozillavr"></a-text>
      <a-text id="text-historial" value="Encara no has visitat\ncap ciutat." position="-0.35 0.05 0.01" color="white" width="1.3"></a-text>
    </a-entity>

  </a-scene>

</body>
</html>
