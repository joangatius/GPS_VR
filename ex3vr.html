<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Repte 3 VR - Manipulació</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <!-- PROGRAMACIÓ PER AGAFAR I MOURE EL PLANETA -->
  <script>
    AFRAME.registerComponent('agafa-objectes', {
      init: function () {
        let comandament = this.el;
        let objecteAgafat = null;

        // Quan es prem el gallet (trigger) de les PICO
        comandament.addEventListener('triggerdown', function () {
          // Mirem què està tocant el raig làser en aquest moment
          let tocats = comandament.components.raycaster.intersectedEls;
          
          if (tocats.length > 0 && tocats[0].classList.contains('interactiu')) {
            objecteAgafat = tocats[0];
            
            // Parem l'animació de girar sola perquè l'alumne en tingui el control
            objecteAgafat.removeAttribute('animation');
            
            // "Enganxem" l'objecte al comandament matemàticament (Això permet moure'l i girar-lo amb la mà)
            comandament.object3D.attach(objecteAgafat.object3D);
          }
        });

        // Quan es deixa anar el gallet
        comandament.addEventListener('triggerup', function () {
          if (objecteAgafat) {
            // Desenganxem l'objecte i el deixem flotant a l'espai de l'habitació
            comandament.sceneEl.object3D.attach(objecteAgafat.object3D);
            objecteAgafat = null;
          }
        });
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <a-assets>
      <!-- La imatge que vas pujar a GitHub -->
      <img id="mapa-terra" src="earth.jpg">
    </a-assets>

    <!-- COMANDAMENTS AMB LA NOVA FUNCIÓ 'agafa-objectes' -->
    <a-entity laser-controls="hand: left" raycaster="objects: .interactiu; far: 5" agafa-objectes></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .interactiu; far: 5" agafa-objectes></a-entity>

    <!-- EL PLANETA TERRA -->
    <!-- Li he afegit id="planeta" i manté la classe interactiu -->
    <a-sphere 
      id="planeta"
      class="interactiu"
      src="#mapa-terra" 
      radius="0.5" 
      position="0 1.2 -1.5" 
      material="roughness: 0.8;"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
    </a-sphere>

    <a-text 
      value="Apunta i prem el gallet per moure i girar la Terra!" 
      position="0 1.9 -1.5" 
      align="center" 
      color="#000000"
      scale="0.5 0.5 0.5">
    </a-text>

  </a-scene>

</body>
</html>
