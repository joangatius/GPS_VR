<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Repte 3 VR - Dia, Nit i Solsticis</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    let ciutatsVisitades =[];

    // 1. MOTOR D'INTERACCIÓ AVANÇAT (Terra + Sol Orbitant)
    AFRAME.registerComponent('control-pico', {
      init: function () {
        this.comandament = this.el;
        this.planetaAgafat = null;
        this.solAgafat = null;
        this.planeta = document.getElementById('planeta');

        this.comandament.addEventListener('triggerdown', (e) => {
          let tocats = this.comandament.components.raycaster.intersectedEls;
          
          if (tocats.length > 0) {
            let tocat = tocats[0];

            // A) HEM TOCAT EL SOL
            if (tocat.classList.contains('sol-interactiu')) {
              this.solAgafat = tocat;
              // Mentre movem el sol, fem que el làser només busqui la "cúpula invisible" per lliscar-hi
              this.comandament.setAttribute('raycaster', 'objects', '.esfera-celest');
            } 
            // B) HEM TOCAT LA TERRA
            else if (tocat.classList.contains('esfera-terra')) {
              this.planetaAgafat = tocat;
              this.comandament.object3D.attach(this.planetaAgafat.object3D);
            } 
            // C) HEM TOCAT UNA XINXETA (Ciutats)
            else if (tocat.classList.contains('pin-ciutat')) {
              actualitzarPanell(
                "📍 " + tocat.getAttribute('data-nom'),
                `Latitud: ${tocat.getAttribute('data-lat')}°\nLongitud: ${tocat.getAttribute('data-lon')}°\n\n${tocat.getAttribute('data-extra')}`,
                tocat.getAttribute('data-img')
              );
              batecAnimacio(tocat);
              afegirAHistorial(tocat.getAttribute('data-nom'));
            }
            // D) HEM TOCAT UNA LÍNIA (Tròpics, Equador, Greenwich)
            else if (tocat.classList.contains('linia-important')) {
              actualitzarPanell(
                "➖ " + tocat.getAttribute('data-nom'),
                tocat.getAttribute('data-info'),
                "null"
              );
              let colorOriginal = tocat.getAttribute('color');
              tocat.setAttribute('color', 'white');
              setTimeout(() => { tocat.setAttribute('color', colorOriginal); }, 400);
            }
          }
        });

        this.comandament.addEventListener('triggerup', (e) => {
          if (this.planetaAgafat) {
            this.comandament.sceneEl.object3D.attach(this.planetaAgafat.object3D);
            this.planetaAgafat = null;
          }
          if (this.solAgafat) {
            this.solAgafat = null;
            // Retornem el làser a la normalitat
            this.comandament.setAttribute('raycaster', 'objects', '.esfera-terra, .pin-ciutat, .linia-important, .sol-interactiu');
          }
        });

        // Funcions de Text
        function actualitzarPanell(titol, descripcio, imgUrl) {
          document.getElementById('text-panell').setAttribute('value', titol);
          document.getElementById('text-coords').setAttribute('value', descripcio);
          let imgEl = document.getElementById('imatge-panell');
          if (imgUrl && imgUrl !== "null") {
            imgEl.setAttribute('src', imgUrl);
            imgEl.setAttribute('visible', 'true');
          } else {
            imgEl.setAttribute('visible', 'false'); 
          }
        }

        function batecAnimacio(element) {
          element.setAttribute('scale', '1.5 1.5 1.5');
          setTimeout(() => { element.setAttribute('scale', '1 1 1'); }, 300);
        }

        function afegirAHistorial(nom) {
          if (!ciutatsVisitades.includes(nom)) {
            ciutatsVisitades.push(nom);
            if (ciutatsVisitades.length > 6) { ciutatsVisitades.shift(); }
            let textLlista = ciutatsVisitades.map((c, i) => `${i+1}. ${c}`).join('\n');
            document.getElementById('text-historial').setAttribute('value', textLlista);
          }
        }
      },

      // AQUEST BUCLE S'EXECUTA 90 COPS PER SEGON (Per calcular l'òrbita del Sol)
      tick: function () {
        if (this.solAgafat) {
          let intersections = this.comandament.components.raycaster.intersections;
          if (intersections.length > 0) {
            let puntImpacte = intersections[0].point; // Punt global on apunta el làser
            
            // 1. Convertim el punt a l'eix relatiu de la Terra
            let puntLocal = new THREE.Vector3().copy(puntImpacte);
            this.planeta.object3D.worldToLocal(puntLocal);

            // 2. MATEMÀTICA DELS TRÒPICS: Calculem l'alçada màxima permesa (23.5 graus)
            let R_orbit = 1.2; // Distància del Sol a la Terra
            let maxY = R_orbit * Math.sin(23.5 * Math.PI / 180); 

            // 3. Bloquegem l'alçada perquè el Sol no pugui passar dels tròpics
            if (puntLocal.y > maxY) puntLocal.y = maxY;
            if (puntLocal.y < -maxY) puntLocal.y = -maxY;

            // 4. Corregim la distància (X i Z) perquè el Sol llisqui sobre una esfera perfecta
            let xzRadius = Math.sqrt(R_orbit * R_orbit - puntLocal.y * puntLocal.y);
            let currentXz = Math.sqrt(puntLocal.x * puntLocal.x + puntLocal.z * puntLocal.z);

            if (currentXz > 0) {
               let escala = xzRadius / currentXz;
               puntLocal.x *= escala;
               puntLocal.z *= escala;
            }

            // 5. Apliquem la posició corregida al Sol
            this.solAgafat.object3D.position.copy(puntLocal);
          }
        }
      }
    });

    // 2. CONSTRUCTOR MATEMÀTIC DE LÍNIES I CIUTATS
    AFRAME.registerComponent('marcadors-terra', {
      init: function () {
        const planeta = this.el;
        const R = 0.5; 

        function afegirLinia(nom, info, lat, color, rotacio) {
          let latRad = lat * Math.PI / 180;
          let r = R * Math.cos(latRad); 
          let y = R * Math.sin(latRad); 

          const linia = document.createElement('a-torus');
          linia.classList.add('linia-important');
          linia.setAttribute('radius', r + 0.001); 
          linia.setAttribute('radius-tubular', 0.0015);
          linia.setAttribute('color', color);
          linia.setAttribute('rotation', rotacio || '90 0 0'); 
          linia.setAttribute('position', `0 ${y} 0`); 
          
          linia.setAttribute('data-nom', nom);
          linia.setAttribute('data-info', info);

          planeta.appendChild(linia);
        }

        // ====== LÍNIES IMPORTANTS ======
        afegirLinia("Equador", "Latitud 0°.\nDivideix la Terra en Nord i Sud.", 0, "yellow");
        afegirLinia("Tròpic de Càncer", "Latitud 23.5° Nord.\nLímit on el Sol pot caure\ntotalment vertical a l'estiu.", 23.5, "orange");
        afegirLinia("Tròpic de Capricorn", "Latitud -23.5° Sud.\nLímit sud on el Sol cau\nvertical al desembre.", -23.5, "orange");
        afegirLinia("Cercle Polar Àrtic", "Latitud 66.5° Nord.\nSi el Sol està al tròpic de Capricorn,\naquí hi ha un dia sencer fosc.", 66.5, "cyan");
        afegirLinia("Cercle Polar Antàrtic", "Latitud -66.5° Sud.\nZona de nits i dies llargs.", -66.5, "cyan");

        // Afegim Greenwich com una línia especial (Vertical en lloc d'Horitzontal)
        const meridian = document.createElement('a-torus');
        meridian.classList.add('linia-important');
        meridian.setAttribute('radius', R + 0.001);
        meridian.setAttribute('radius-tubular', 0.0015);
        meridian.setAttribute('color', 'lime');
        meridian.setAttribute('rotation', '0 90 0'); 
        meridian.setAttribute('data-nom', "Meridià de Greenwich");
        meridian.setAttribute('data-info', "Longitud 0°.\nServeix de referència per als fusos\nhoraris (Est i Oest).");
        planeta.appendChild(meridian);

        this.afegirMarcador = function(nom, lat, lon, color, infoExtra, imatgeUrl) {
          let offsetTextura = -90; 
          let latRad = lat * Math.PI / 180;
          let lonRad = (lon + offsetTextura) * Math.PI / 180; 
          let radiXinxeta = 0.008; 
          let R_exterior = R + radiXinxeta; 
          
          let x = -R_exterior * Math.cos(latRad) * Math.sin(lonRad);
          let y =  R_exterior * Math.sin(latRad);
          let z = -R_exterior * Math.cos(latRad) * Math.cos(lonRad);
          
          const punt = document.createElement('a-sphere');
          punt.classList.add('pin-ciutat'); 
          punt.setAttribute('radius', radiXinxeta);
          punt.setAttribute('color', color);
          punt.setAttribute('position', `${x} ${y} ${z}`);
          
          punt.setAttribute('data-nom', nom);
          punt.setAttribute('data-lat', lat);
          punt.setAttribute('data-lon', lon);
          punt.setAttribute('data-extra', infoExtra);
          punt.setAttribute('data-img', imatgeUrl);

          planeta.appendChild(punt);
        }

        // ====== CIUTATS ======
        this.afegirMarcador("Lleida", 41.61, 0.61, "red", "Zona temperada.", "lleida.jpg");
        this.afegirMarcador("Nova York", 40.71, -74.00, "cyan", "Estats Units.", "null");
        this.afegirMarcador("Sydney", -33.86, 151.20, "magenta", "Austràlia.", "null");
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <!-- Llum ambient molt suau perquè la meitat de nit quedi a les fosques -->
    <a-light type="ambient" color="#333" intensity="0.6"></a-light>

    <a-assets>
      <img id="mapa-terra" src="earth.jpg">
      <img id="img-lleida" src="lleida.jpg">
    </a-assets>

    <!-- COMANDAMENTS (Per defecte llegeixen tot menys la cúpula invisible) -->
    <a-entity laser-controls="hand: left" raycaster="objects: .esfera-terra, .pin-ciutat, .linia-important, .sol-interactiu; far: 5" control-pico></a-entity>
    <a-entity laser-controls="hand: right" raycaster="objects: .esfera-terra, .pin-ciutat, .linia-important, .sol-interactiu; far: 5" control-pico></a-entity>

    <!-- EL PLANETA I TOTS ELS SEUS ELEMENTS FILLS -->
    <!-- (Com que el Sol està a dins d'aquesta etiqueta, si gires la Terra el Sol gira amb ella) -->
    <!-- He tret l'animació automàtica de gir perquè tingueu control total manualment -->
    <a-entity id="planeta" position="0 1.2 -1.5">
        
        <!-- Cúpula invisible on rellisca el Sol (Radi 1.2m) -->
        <a-sphere class="esfera-celest" radius="1.2" material="transparent: true; opacity: 0; side: double"></a-sphere>

        <!-- La Terra Física -->
        <a-sphere 
          class="esfera-terra"
          src="#mapa-terra" 
          marcadors-terra
          radius="0.5" 
          material="shader: standard; roughness: 0.95; metalness: 0.0;">
        </a-sphere>

        <!-- EL SOL (Radi 1.2 cap a l'eix Z per tenir-lo davant de primeres) -->
        <a-sphere 
          id="el-sol" 
          class="sol-interactiu" 
          radius="0.08" 
          color="#FFF200" 
          material="shader: flat" 
          position="0 0 1.2">
          
          <!-- Llum Molt Potent per crear un bon contrast dia/nit -->
          <a-light type="point" color="#FFFFFF" intensity="3.5" distance="10"></a-light>
        </a-sphere>

    </a-entity>

    <!-- 1. PANELL D'INFORMACIÓ -->
    <a-entity id="panell-info" position="0.9 1.4 -1.5" rotation="0 -20 0">
      <a-plane color="#111" opacity="0.8" width="0.8" height="0.8" border-radius="0.05"></a-plane>
      <a-text id="text-panell" value="Benvingut al món" position="-0.35 0.30 0.01" color="#F0E68C" width="1.5" font="mozillavr"></a-text>
      <a-text id="text-coords" value="Apunta i clica als\nelements per descobrir." position="-0.35 0.10 0.01" color="white" width="1.2"></a-text>
      <a-image id="imatge-panell" src="" position="0 -0.15 0.02" width="0.7" height="0.4" visible="false"></a-image>
    </a-entity>

    <!-- 2. PANELL D'HISTORIAL -->
    <a-entity id="panell-historial" position="-0.8 1.4 -1.5" rotation="0 20 0">
      <a-plane color="#111" opacity="0.8" width="0.7" height="0.6" border-radius="0.05"></a-plane>
      <a-text value="Historial de Visites" position="-0.30 0.20 0.01" color="#00FF7F" width="1.4" font="mozillavr"></a-text>
      <a-text id="text-historial" value="Encara no has visitat\ncap ciutat." position="-0.30 0.05 0.01" color="white" width="1.2"></a-text>
    </a-entity>

  </a-scene>

</body>
</html>
