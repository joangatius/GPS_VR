<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <title>Visor Everest VR - Ajust d'Alçada</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <script>
    // COMPONENT PER PUJAR I BAIXAR EL MODEL AMB EL JOYSTICK
    AFRAME.registerComponent('control-alcada', {
      schema: { target: { type: 'selector' } }, // Rep quin objecte ha de moure
      
      init: function () {
        this.stickY = 0;
        
        // Detectem quan es mou la palanqueta (joystick) de les PICO
        this.el.addEventListener('thumbstickmoved', (e) => {
          // L'eix Y va de -1 (amunt) a 1 (avall)
          this.stickY = e.detail.y; 
        });
      },
      
      tick: function () {
        // Executem el moviment 90 cops per segon per fer-ho súper suau
        // Posem un marge de 0.1 perquè no es mogui sol si el joystick tremola una mica
        if (Math.abs(this.stickY) > 0.1) {
          let model3D = this.data.target.object3D;
          
          // Movem l'objecte. Multipliquem per 0.05 per controlar la velocitat
          model3D.position.y -= this.stickY * 0.05; 
        }
      }
    });
  </script>
</head>
<body>

  <a-scene webxr="optionalFeatures: local-floor;" background="transparent: true">
    
    <a-assets>
      <!-- El teu Everest de 4MB perfecte -->
      <a-asset-item id="model-everest" src="everest5.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" color="#FFF" intensity="0.6"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.8" position="2 4 3"></a-light>

    <!-- COMANDAMENTS AMB EL NOU CONTROL D'ALÇADA -->
    <!-- Li diem que l'objectiu a moure és l'element amb id "maqueta-everest" -->
    <a-entity laser-controls="hand: left" raycaster="far: 5" control-alcada="target: #maqueta-everest"></a-entity>
    <a-entity laser-controls="hand: right" raycaster="far: 5" control-alcada="target: #maqueta-everest"></a-entity>

    <!-- EL MODEL 3D DE L'EVEREST -->
    <!-- L'he posat d'inici a Y = -3.0 perquè ja surti més avall del normal -->
    <a-entity 
        id="maqueta-everest"
        gltf-model="#model-everest" 
        position="0 -3.0 -2.0" 
        scale="0.001 0.001 0.001">
    </a-entity>

    <!-- Panell d'instruccions flotant -->
    <a-text value="Utilitza el JOYSTICK del teu comandament\nper pujar o baixar la muntanya." position="-1 1.5 -2" color="black" scale="0.5 0.5 0.5"></a-text>

  </a-scene>

</body>
</html>
